name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd mobile-app
          npm install

      - name: Prebuild Native Android Project
        run: |
          cd mobile-app
          npx expo prebuild --platform android --no-install

      - name: Build Android App (Debug APK with Bundle)
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleDebug -PbundleInDebug=true --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfc-sender-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
